<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đăng Ký & Tiền Xe (Đồng Bộ Google Sheets)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            /* Link ảnh hội trại đã được tối ưu chạy trực tiếp, hiển thị 100% ổn định */
            background-image: url('https://lh3.googleusercontent.com/d/1zstDzrxve5nlU0jd2PyClp1i6hzPx4In');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #2c3e50;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            /* Giữ độ đậm 0.98 để ô danh sách luôn rõ nét, không bị hình nền đè chữ */
            background: rgba(255, 255, 255, 0.98); 
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25); 
        }
        h2 {
            color: #1b1b1b;
            margin-bottom: 8px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
        }
        p.subtitle {
            text-align: center;
            color: #57606f;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 500;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .search-box {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #a4b0be;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
            background-color: #fff;
            color: #2c3e50;
        }
        .search-box:focus {
            border-color: #27ae60;
            outline: none;
            box-shadow: 0 0 8px rgba(39, 174, 96, 0.3);
        }
        .btn-refresh {
            background-color: #27ae60; 
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-refresh:hover {
            background-color: #219a52;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1b1b1b;
            margin: 20px 0 10px 0;
            padding-left: 8px;
            border-left: 4px solid #27ae60;
        }
        .section-title.omitted {
            border-left-color: #7f8c8d;
            color: #57606f;
            margin-top: 35px;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #ced6e0;
            vertical-align: middle;
        }
        th {
            background-color: #f1f2f6;
            color: #2c3e50;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        
        #activeTable td {
            color: #1b1b1b;
            font-weight: 500;
        }

        .omitted-table td {
            color: #7f8c8d;
        }
        .omitted-table tr {
            background-color: #f8fafc;
        }
        tr:hover {
            background-color: #f1f2f6 !important;
        }
        .money-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .txt-money {
            font-weight: 700;
            color: #d35400;
            font-size: 16px;
        }
        .omitted-table .txt-money {
            color: #a4b0be;
        }
        .no-data {
            text-align: center;
            padding: 25px;
            color: #7f8c8d;
            display: none;
            font-size: 15px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #27ae60;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Danh Sách Đăng Ký Tra Cứu</h2>
    <p class="subtitle">Dữ liệu tự động đồng bộ từ Google Sheets</p>
    
    <div class="action-bar">
        <input type="text" id="searchInput" class="search-box" onkeyup="filterTables()" placeholder="Nhập tên thành viên cần tìm nhanh...">
        <button class="btn-refresh" onclick="fetchSheetsData()">🔄 Tải lại Sheets</button>
    </div>

    <div id="loadingStatus" class="loading">Đang tải dữ liệu từ Google Sheets...</div>

    <div id="tablesContainer" style="display: none;">
        
        <div class="section-title">Danh Sách Thành Viên Hoạt Động</div>
        <div class="table-wrapper">
            <table id="activeTable">
                <thead>
                    <tr>
                        <th style="width: 15%;">STT</th>
                        <th style="width: 50%;">Họ và Tên</th>
                        <th style="width: 35%; text-align: right;">Tiền Xe</th>
                    </tr>
                </thead>
                <tbody id="activeBody"></tbody>
            </table>
        </div>
        
        <div class="section-title section-title omitted">Danh Sách Thành Viên Đã Bỏ</div>
        <div class="table-wrapper">
            <table id="omittedTable" class="omitted-table">
                <thead>
                    <tr>
                        <th style="width: 15%;">STT</th>
                        <th style="width: 50%;">Họ và Tên</th>
                        <th style="width: 35%; text-align: right;">Tiền Xe</th>
                    </tr>
                </thead>
                <tbody id="omittedBody"></tbody>
            </table>
        </div>

    </div>
    
    <div id="noData" class="no-data">Không tìm thấy thành viên này</div>
</div>

<script>
const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTq9RqoyKo2R4qVXTRa_Q2PlA_AAhLBNi_1z2Vw-DRZX6ObCrJXRDmdPNc7pv7XnOiarpJysbyAP5e7/pub?output=csv";

let activeData = [];
let omittedData = [];

async function fetchSheetsData() {
    const loadingStatus = document.getElementById("loadingStatus");
    const tablesContainer = document.getElementById("tablesContainer");
    loadingStatus.style.display = "block";
    tablesContainer.style.display = "none";
    loadingStatus.innerText = "Đang tải dữ liệu từ Google Sheets...";

    try {
        const response = await fetch(sheetCsvUrl + "&t=" + new Date().getTime());
        if (!response.ok) throw new Error("Không thể tải dữ liệu");
        
        const csvText = await response.text();
        parseCsvData(csvText);
    } catch (error) {
        console.error(error);
        loadingStatus.innerText = "Lỗi: Không thể lấy dữ liệu từ Google Sheets.";
    }
}

function splitCsvLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
             inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
             result.push(current.trim().replace(/^"|"$/g, ''));
             current = '';
        } else {
             current += char;
        }
    }
    result.push(current.trim().replace(/^"|"$/g, ''));
    return result;
}

function removeVietnameseTones(str) {
    str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g,"a");
    str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g,"e");
    str = str.replace(/ì|í|ị|ỉ|ĩ/g,"i");
    str = str.replace(/ò|ó|ọ|ỏ|ã|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g,"o");
    str = str.replace(/ù|á|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g,"u");
    str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g,"y");
    str = str.replace(/đ/g,"d");
    str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
    str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
    str = str.replace(/Ì|Í|Ị|ỉ|Ĩ/g, "I");
    str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
    str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
    str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
    str = str.replace(/Đ/g, "D");
    str = str.replace(/\u0300|\u0301|\u0303|\u0309|\u0323/g, ""); 
    str = str.replace(/\u02C6|\u0306|\u031B/g, ""); 
    return str;
}

function parseCsvData(csvText) {
    const lines = csvText.split("\n");
    if (lines.length <= 1) return;

    const headers = splitCsvLine(lines[0]);
    
    let nameIndex = headers.findIndex(h => h.toLowerCase().includes("họ") || h.toLowerCase().includes("tên"));
    if (nameIndex === -1) nameIndex = 1; 

    let moneyIndex = headers.findIndex(h => h.toLowerCase().includes("tiền") || h.toLowerCase().includes("xe"));
    if (moneyIndex === -1 || moneyIndex === nameIndex) moneyIndex = headers.length - 1;

    activeData = [];
    omittedData = [];
    
    let globalIndex = 1;

    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const columns = splitCsvLine(line);
        const name = columns[nameIndex] ? columns[nameIndex].trim() : "";
        let money = columns[moneyIndex] ? columns[moneyIndex].trim() : "-";

        if (!money) money = "-";

        if (name) {
            let isOmitted = /\(\s*bỏ\s*\)/i.test(name);
            
            let item = { 
                stt: globalIndex, 
                name: name, 
                money: money 
            };
            
            if (isOmitted) {
                omittedData.push(item);
            } else {
                activeData.push(item);
            }
            
            globalIndex++;
        }
    }

    document.getElementById("loadingStatus").style.display = "none";
    document.getElementById("tablesContainer").style.display = "block";
    renderTables();
}

function renderTables() {
    const activeBody = document.getElementById("activeBody");
    activeBody.innerHTML = "";
    activeData.forEach((item) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${item.stt}</td>
            <td class="name-cell">${item.name}</td>
            <td><div class="money-container"><span class="txt-money">${item.money}</span></div></td>
        `;
        activeBody.appendChild(tr);
    });

    const omittedBody = document.getElementById("omittedBody");
    omittedBody.innerHTML = "";
    omittedData.forEach((item) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${item.stt}</td>
            <td class="name-cell">${item.name}</td>
            <td><div class="money-container"><span class="txt-money">${item.money}</span></div></td>
        `;
        omittedBody.appendChild(tr);
    });
}

function filterTables() {
    const input = document.getElementById("searchInput");
    const filter = removeVietnameseTones(input.value.toUpperCase().trim());
    
    let hasDataActive = filterSingleTable("activeTable", filter);
    let hasDataOmitted = filterSingleTable("omittedTable", filter);
    
    document.getElementById("noData").style.display = (hasDataActive || hasDataOmitted) ? "none" : "block";
}

function filterSingleTable(tableId, filter) {
    const table = document.getElementById(tableId);
    const tr = table.getElementsByTagName("tr");
    let matchFound = false;

    for (let i = 1; i < tr.length; i++) {
        const tdName = tr[i].getElementsByClassName("name-cell")[0];
        if (tdName) {
            const txtValue = removeVietnameseTones(tdName.textContent || tdName.innerText);
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
                matchFound = true;
            } else {
                tr[i].style.display = "none";
            }
        }        
    }
    return matchFound;
}

window.onload = fetchSheetsData;
</script>

</body>
</html>
