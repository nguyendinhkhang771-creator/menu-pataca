<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đăng Ký & Tiền Xe (Tự Động Lưu)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 40px 20px;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 8px;
            text-align: center;
            font-size: 24px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .search-box:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
        }
        .btn-add {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-add:hover {
            background-color: #27ae60;
        }
        .btn-edit-mode {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-edit-mode.active {
            background-color: #f1c40f;
            color: #2c3e50;
        }
        .btn-reset {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset:hover {
            background-color: #c0392b;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }
        th {
            background-color: #f8fafc;
            color: #4a5568;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        tr.marked {
            background-color: #fff9db !important;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        .input-name {
            width: 100%;
            padding: 8px;
            border: 1px dashed #ccc;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
        }
        .input-name:focus {
            border-color: #3498db;
            outline: none;
        }
        .money-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }
        .input-money {
            width: 70px;
            padding: 6px;
            text-align: right;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-weight: bold;
            color: #e67e22;
            background: #fff;
        }
        .input-money:disabled {
            background: transparent;
            border-color: transparent;
        }
        .checkbox-mark {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .no-data {
            text-align: center;
            padding: 25px;
            color: #95a5a6;
            display: none;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Danh Sách Đăng Ký Tra Cứu</h2>
    <p class="subtitle">Dữ liệu lưu trên trình duyệt - Bật nút Chỉnh sửa để thay đổi thông tin</p>
    
    <div class="action-bar">
        <input type="text" id="searchInput" class="search-box" onkeyup="filterTable()" placeholder="Nhập tên thành viên cần tìm nhanh...">
        <button class="btn-edit-mode" id="editModeBtn" onclick="toggleEditMode()">✏️ Chỉnh sửa</button>
        <button class="btn-add" onclick="addNewRow()">+ Thêm người</button>
        <button class="btn-reset" onclick="resetAllData()" title="Xóa bộ nhớ tạm về mặc định">Reset</button>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr>
                    <th style="width: 10%;">STT</th>
                    <th style="width: 55%;">Họ và Tên</th>
                    <th style="width: 35%; text-align: right;">Đánh dấu / Tiền Xe</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
    
    <div id="noData" class="no-data">Không tìm thấy thành viên này</div>
</div>

<script>
const defaultMembers = [
    { name: "PHAN THỊ KIỀU MAI", money: "-" },
    { name: "Nguyễn Kim Sơn", money: "-" },
    { name: "Trần Phạm Ly Linh", money: "1" },
    { name: "Trần Thị Thanh Hiền", money: "-" },
    { name: "Lê Thị Thuỷ Nhung", money: "-" },
    { name: "Lê Ngọc Triều Tiên", money: "-" },
    { name: "Huỳnh Thị Kim Tân", money: "-" },
    { name: "Bùi Gia Bảo", money: "-" },
    { name: "Nguyễn Thanh Nhã", money: "-" },
    { name: "Ngô Thị Như Ý", money: "-" },
    { name: "nguyễn minh hải", money: "-" },
    { name: "Lê kỳ nam", money: "-" },
    { name: "Lê Nguyễn Khôi", money: "1" },
    { name: "Đỗ Đức Phú", money: "1" },
    { name: "Nguyễn Phan Hữu Bằng", money: "-" },
    { name: "Nguyễn Phan Khải Nguyên", money: "-" },
    { name: "Nguyễn Ngọc Quỳnh Trân", money: "-" },
    { name: "phạm thị ngọc hương", money: "-" },
    { name: "Phan thị hoàn mỹ", money: "-" },
    { name: "Nguyễn Phương Linh", money: "-" },
    { name: "nguyễn bảo an", money: "2" },
    { name: "Trần Tú Như", money: "-" },
    { name: "Hồ Minh Nhật", money: "-" },
    { name: "Nguyễn thông tịnh uyên", money: "-" },
    { name: "Lê Minh Thảo", money: "-" },
    { name: "Hồ Minh Nhật", money: "-" },
    { name: "Lê Minh Thảo", money: "-" },
    { name: "trần thị thanh lộc", money: "-" },
    { name: "Lê Ngọc Bảo ngân", money: "-" },
    { name: "Nguyễn thông tịnh uyên", money: "-" },
    { name: "Trần Gia Nhi", money: "-" },
    { name: "Nguyễn Đình Khang", money: "-" },
    { name: "LÊ THỊ QUỲNH NHƯ", money: "-" }
];

let appData = [];
let isEditMode = false; // Trạng thái chế độ chỉnh sửa công khai

function initData() {
    const savedData = localStorage.getItem('quanly_tienxe_data');
    if (savedData) {
        appData = JSON.parse(savedData);
    } else {
        appData = defaultMembers.map(m => ({ name: m.name, money: m.money, marked: false }));
    }
    renderTable();
}

function renderTable() {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";
    
    appData.forEach((item, index) => {
        const tr = document.createElement("tr");
        if (item.marked) tr.classList.add('marked');
        
        // Hiển thị tên (chữ thường hoặc ô ô nhập tùy thuộc vào trạng thái chế độ chỉnh sửa)
        let nameHTML = isEditMode 
            ? `<input type="text" class="input-name" value="${item.name}" onchange="updateName(${index}, this.value)">`
            : item.name;
            
        tr.innerHTML = `
            <td>${index + 1}</td>
            <td class="name-cell">${nameHTML}</td>
            <td>
                <div class="money-container">
                    <input type="checkbox" class="checkbox-mark" ${item.marked ? 'checked' : ''} onchange="toggleMark(${index}, this)">
                    <input type="text" class="input-money" value="${item.money}" ${isEditMode ? '' : 'disabled'} onchange="updateMoney(${index}, this.value)">
                </div>
            </td>
        `;
        tableBody.appendChild(tr);
    });
}

// Bật/Tắt chế độ chỉnh sửa hàng loạt
function toggleEditMode() {
    isEditMode = !isEditMode;
    const btn = document.getElementById("editModeBtn");
    if (isEditMode) {
        btn.innerText = "💾 Hoàn thành";
        btn.classList.add("active");
    } else {
        btn.innerText = "✏️ Chỉnh sửa";
        btn.classList.remove("active");
        saveToStorage(); // Thực hiện lưu khi bấm hoàn thành
    }
    renderTable();
}

function saveToStorage() {
    localStorage.setItem('quanly_tienxe_data', JSON.stringify(appData));
}

function toggleMark(index, checkbox) {
    appData[index].marked = checkbox.checked;
    saveToStorage();
    const row = checkbox.closest('tr');
    if (checkbox.checked) {
        row.classList.add('marked');
    } else {
        row.classList.remove('marked');
    }
}

function updateMoney(index, newValue) {
    appData[index].money = newValue;
    saveToStorage();
}

function updateName(index, newName) {
    appData[index].name = newName;
    saveToStorage();
}

function addNewRow() {
    appData.push({ name: "", money: "-", marked: false });
    saveToStorage();
    
    // Khi thêm người mới, tự động mở chế độ chỉnh sửa để người dùng nhập tên luôn
    isEditMode = true;
    const btn = document.getElementById("editModeBtn");
    btn.innerText = "💾 Hoàn thành";
    btn.classList.add("active");
    
    renderTable();
    
    const rows = document.getElementById("tableBody").getElementsByTagName("tr");
    if(rows.length > 0) {
        rows[rows.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

function resetAllData() {
    if (confirm("Xóa hết chỉnh sửa để quay về danh sách mặc định gốc?")) {
        localStorage.removeItem('quanly_tienxe_data');
        isEditMode = false;
        document.getElementById("editModeBtn").innerText = "✏️ Chỉnh sửa";
        document.getElementById("editModeBtn").classList.remove("active");
        initData();
    }
}

function filterTable() {
    const input = document.getElementById("searchInput");
    const filter = input.value.toUpperCase().trim();
    const table = document.getElementById("dataTable");
    const tr = table.getElementsByTagName("tr");
    let hasData = false;

    for (let i = 1; i < tr.length; i++) {
        const tdName = tr[i].getElementsByClassName("name-cell")[0];
        if (tdName) {
            const inputField = tdName.querySelector('.input-name');
            const txtValue = inputField ? inputField.value : (tdName.textContent || tdName.innerText);
            
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
                hasData = true;
            } else {
                tr[i].style.display = "none";
            }
        }       
    }
    document.getElementById("noData").style.display = hasData ? "none" : "block";
}

window.onload = initData;
</script>

</body>
</html>
