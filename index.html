<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đăng Ký & Tiền Xe (Đồng Bộ Google Sheets)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 8px;
            text-align: center;
            font-size: 24px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .search-box:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
        }
        .btn-refresh {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-refresh:hover {
            background-color: #2980b9;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }
        th {
            background-color: #f8fafc;
            color: #4a5568;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        tr.marked {
            background-color: #fff9db !important;
        }
        /* Style tạo khác biệt hoàn toàn cho dòng của người có chữ (bỏ) */
        tr.omitted-row {
            background-color: #f5f6fa !important;
            color: #95a5a6;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        .money-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            min-height: 24px; /* Giữ khung cố định kể cả khi mất ô tích */
        }
        .txt-money {
            font-weight: bold;
            color: #e67e22;
        }
        .checkbox-mark {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .no-data {
            text-align: center;
            padding: 25px;
            color: #95a5a6;
            display: none;
            font-size: 15px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #3498db;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Danh Sách Đăng Ký Tra Cứu</h2>
    <p class="subtitle">Dữ liệu tự động đồng bộ từ Google Sheets - Đánh dấu trạng thái lưu tại trình duyệt</p>
    
    <div class="action-bar">
        <input type="text" id="searchInput" class="search-box" onkeyup="filterTable()" placeholder="Nhập tên thành viên cần tìm nhanh...">
        <button class="btn-refresh" onclick="fetchSheetsData()">🔄 Tải lại Sheets</button>
    </div>

    <div id="loadingStatus" class="loading">Đang tải dữ liệu từ Google Sheets...</div>

    <div class="table-wrapper" id="tableWrapper" style="display: none;">
        <table id="dataTable">
            <thead>
                <tr>
                    <th style="width: 15%;">STT</th>
                    <th style="width: 45%;">Họ và Tên</th>
                    <th style="width: 40%; text-align: right;">Đánh dấu / Tiền Xe</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    
    <div id="noData" class="no-data">Không tìm thấy thành viên này</div>
</div>

<script>
const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTq9RqoyKo2R4qVXTRa_Q2PlA_AAhLBNi_1z2Vw-DRZX6ObCrJXRDmdPNc7pv7XnOiarpJysbyAP5e7/pub?output=csv";

let appData = [];

async function fetchSheetsData() {
    const loadingStatus = document.getElementById("loadingStatus");
    const tableWrapper = document.getElementById("tableWrapper");
    loadingStatus.style.display = "block";
    tableWrapper.style.display = "none";
    loadingStatus.innerText = "Đang tải dữ liệu từ Google Sheets...";

    try {
        const response = await fetch(sheetCsvUrl + "&t=" + new Date().getTime());
        if (!response.ok) throw new Error("Không thể tải dữ liệu");
        
        const csvText = await response.text();
        parseCsvData(csvText);
    } catch (error) {
        console.error(error);
        loadingStatus.innerText = "Lỗi: Không thể lấy dữ liệu từ Google Sheets.";
    }
}

function splitCsvLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
             inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
             result.push(current.trim().replace(/^"|"$/g, ''));
             current = '';
        } else {
             current += char;
        }
    }
    result.push(current.trim().replace(/^"|"$/g, ''));
    return result;
}

function parseCsvData(csvText) {
    const lines = csvText.split("\n");
    if (lines.length <= 1) return;

    const headers = splitCsvLine(lines[0]);
    
    let nameIndex = headers.findIndex(h => h.toLowerCase().includes("họ") || h.toLowerCase().includes("tên"));
    if (nameIndex === -1) nameIndex = 1; 

    let moneyIndex = headers.findIndex(h => h.toLowerCase().includes("tiền") || h.toLowerCase().includes("xe"));
    if (moneyIndex === -1 || moneyIndex === nameIndex) moneyIndex = headers.length - 1;

    const savedMarks = JSON.parse(localStorage.getItem('quanly_tienxe_marks') || '{}');
    appData = [];

    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const columns = splitCsvLine(line);
        const name = columns[nameIndex] ? columns[nameIndex].trim() : "";
        let money = columns[moneyIndex] ? columns[moneyIndex].trim() : "-";

        if (!money) money = "-";

        if (name) {
            // Nhận diện thông minh: (bỏ), ( bỏ), (bỏ ), ( bỏ ) công thức RegExp gọn gàng
            let isOmitted = /\(\s*bỏ\s*\)/i.test(name);
            let isMarked = isOmitted ? false : (savedMarks[name] || false);

            appData.push({
                name: name,
                money: money,
                marked: isMarked,
                isOmitted: isOmitted // Lưu trạng thái để phục vụ logic ẩn nút tích
            });
        }
    }

    document.getElementById("loadingStatus").style.display = "none";
    document.getElementById("tableWrapper").style.display = "block";
    renderTable();
}

function renderTable() {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";
    
    appData.forEach((item, index) => {
        const tr = document.createElement("tr");
        
        if (item.isOmitted) {
            tr.classList.add('omitted-row'); // Áp dụng nền xám riêng biệt
        } else if (item.marked) {
            tr.classList.add('marked'); // Nền vàng nếu tích chọn thông thường
        }
        
        // Logic ẩn dấu tích hoàn toàn cho dòng có chữ (bỏ)
        let checkboxHtml = item.isOmitted 
            ? '' 
            : `<input type="checkbox" class="checkbox-mark" ${item.marked ? 'checked' : ''} onchange="toggleMark(${index}, this)">`;

        tr.innerHTML = `
            <td>${index + 1}</td>
            <td class="name-cell">${item.name}</td>
            <td>
                <div class="money-container">
                    ${checkboxHtml}
                    <span class="txt-money">${item.money}</span>
                </div>
            </td>
        `;
        tableBody.appendChild(tr);
    });
}

function toggleMark(index, checkbox) {
    appData[index].marked = checkbox.checked;
    const savedMarks = JSON.parse(localStorage.getItem('quanly_tienxe_marks') || '{}');
    savedMarks[appData[index].name] = checkbox.checked;
    localStorage.setItem('quanly_tienxe_marks', JSON.stringify(savedMarks));

    const row = checkbox.closest('tr');
    if (checkbox.checked) {
        row.classList.add('marked');
    } else {
        row.classList.remove('marked');
    }
}

function filterTable() {
    const input = document.getElementById("searchInput");
    const filter = input.value.toUpperCase().trim();
    const table = document.getElementById("dataTable");
    const tr = table.getElementsByTagName("tr");
    let hasData = false;

    for (let i = 1; i < tr.length; i++) {
        const tdName = tr[i].getElementsByClassName("name-cell")[0];
        if (tdName) {
            const txtValue = tdName.textContent || tdName.innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
                hasData = true;
            } else {
                tr[i].style.display = "none";
            }
        }        
    }
    document.getElementById("noData").style.display = hasData ? "none" : "block";
}

window.onload = fetchSheetsData;
</script>

</body>
</html>
