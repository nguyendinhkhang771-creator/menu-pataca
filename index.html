<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đăng Ký & Tiền Xe (Đồng Bộ Google Sheets)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 8px;
            text-align: center;
            font-size: 24px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .search-box:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
        }
        .btn-refresh {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-refresh:hover {
            background-color: #2980b9;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
            vertical-align: middle;
        }
        th {
            background-color: #f8fafc;
            color: #4a5568;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        /* Style màu nền xám phân biệt cho những người có chữ (bỏ) */
        tr.omitted-row {
            background-color: #f5f6fa !important;
            color: #95a5a6;
        }
        tr:hover {
            background-color: #f8fafc;
        }
        .money-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .txt-money {
            font-weight: bold;
            color: #e67e22;
            font-size: 16px;
        }
        .no-data {
            text-align: center;
            padding: 25px;
            color: #95a5a6;
            display: none;
            font-size: 15px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #3498db;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Danh Sách Đăng Ký Tra Cứu</h2>
    <p class="subtitle">Dữ liệu tự động đồng bộ từ Google Sheets</p>
    
    <div class="action-bar">
        <input type="text" id="searchInput" class="search-box" onkeyup="filterTable()" placeholder="Nhập tên thành viên cần tìm nhanh...">
        <button class="btn-refresh" onclick="fetchSheetsData()">🔄 Tải lại Sheets</button>
    </div>

    <div id="loadingStatus" class="loading">Đang tải dữ liệu từ Google Sheets...</div>

    <div class="table-wrapper" id="tableWrapper" style="display: none;">
        <table id="dataTable">
            <thead>
                <tr>
                    <th style="width: 15%;">STT</th>
                    <th style="width: 50%;">Họ và Tên</th>
                    <th style="width: 35%; text-align: right;">Tiền Xe</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    
    <div id="noData" class="no-data">Không tìm thấy thành viên này</div>
</div>

<script>
const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTq9RqoyKo2R4qVXTRa_Q2PlA_AAhLBNi_1z2Vw-DRZX6ObCrJXRDmdPNc7pv7XnOiarpJysbyAP5e7/pub?output=csv";

let appData = [];

async function fetchSheetsData() {
    const loadingStatus = document.getElementById("loadingStatus");
    const tableWrapper = document.getElementById("tableWrapper");
    loadingStatus.style.display = "block";
    tableWrapper.style.display = "none";
    loadingStatus.innerText = "Đang tải dữ liệu từ Google Sheets...";

    try {
        const response = await fetch(sheetCsvUrl + "&t=" + new Date().getTime());
        if (!response.ok) throw new Error("Không thể tải dữ liệu");
        
        const csvText = await response.text();
        parseCsvData(csvText);
    } catch (error) {
        console.error(error);
        loadingStatus.innerText = "Lỗi: Không thể lấy dữ liệu từ Google Sheets.";
    }
}

function splitCsvLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
             inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
             result.push(current.trim().replace(/^"|"$/g, ''));
             current = '';
        } else {
             current += char;
        }
    }
    result.push(current.trim().replace(/^"|"$/g, ''));
    return result;
}

// Hàm loại bỏ dấu tiếng Việt để tìm kiếm chính xác hơn
function removeVietnameseTones(str) {
    str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g,"a");
    str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g,"e");
    str = str.replace(/ì|í|ị|ỉ|ĩ/g,"i");
    str = str.replace(/ò|ó|ọ|ỏ|ã|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g,"o");
    str = str.replace(/ù|á|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g,"u");
    str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g,"y");
    str = str.replace(/đ/g,"d");
    str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
    str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
    str = str.replace(/Ì|Í|Ị|ỉ|Ĩ/g, "I");
    str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
    str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
    str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
    str = str.replace(/Đ/g, "D");
    // Một vài bộ cải tiến thêm nếu cần thiết
    str = str.replace(/\u0300|\u0301|\u0303|\u0309|\u0323/g, ""); // Huyền sắc hỏi ngã nặng 
    str = str.replace(/\u02C6|\u0306|\u031B/g, ""); // Â, Ă, Ơ, Ư
    return str;
}

function parseCsvData(csvText) {
    const lines = csvText.split("\n");
    if (lines.length <= 1) return;

    const headers = splitCsvLine(lines[0]);
    
    let nameIndex = headers.findIndex(h => h.toLowerCase().includes("họ") || h.toLowerCase().includes("tên"));
    if (nameIndex === -1) nameIndex = 1; 

    let moneyIndex = headers.findIndex(h => h.toLowerCase().includes("tiền") || h.toLowerCase().includes("xe"));
    if (moneyIndex === -1 || moneyIndex === nameIndex) moneyIndex = headers.length - 1;

    appData = [];

    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const columns = splitCsvLine(line);
        const name = columns[nameIndex] ? columns[nameIndex].trim() : "";
        let money = columns[moneyIndex] ? columns[moneyIndex].trim() : "-";

        if (!money) money = "-";

        if (name) {
            // Nhận diện người có chữ (bỏ) để đổi màu nền dòng cho dễ nhận biết
            let isOmitted = /\(\s*bỏ\s*\)/i.test(name);

            appData.push({
                name: name,
                money: money,
                isOmitted: isOmitted
            });
        }
    }

    document.getElementById("loadingStatus").style.display = "none";
    document.getElementById("tableWrapper").style.display = "block";
    renderTable();
}

function renderTable() {
    const tableBody = document.getElementById("tableBody");
    tableBody.innerHTML = "";
    
    appData.forEach((item, index) => {
        const tr = document.createElement("tr");
        
        // Nếu tên chứa chữ (bỏ) thì chuyển dòng thành màu xám nhạt
        if (item.isOmitted) {
            tr.classList.add('omitted-row');
        }

        tr.innerHTML = `
            <td>${index + 1}</td>
            <td class="name-cell">${item.name}</td>
            <td>
                <div class="money-container">
                    <span class="txt-money">${item.money}</span>
                </div>
            </td>
        `;
        tableBody.appendChild(tr);
    });
}

function filterTable() {
    const input = document.getElementById("searchInput");
    const filter = removeVietnameseTones(input.value.toUpperCase().trim());
    const table = document.getElementById("dataTable");
    const tr = table.getElementsByTagName("tr");
    let hasData = false;

    for (let i = 1; i < tr.length; i++) {
        const tdName = tr[i].getElementsByClassName("name-cell")[0];
        if (tdName) {
            const txtValue = removeVietnameseTones(tdName.textContent || tdName.innerText);
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                tr[i].style.display = "";
                hasData = true;
            } else {
                tr[i].style.display = "none";
            }
        }        
    }
    document.getElementById("noData").style.display = hasData ? "none" : "block";
}

window.onload = fetchSheetsData;
</script>

</body>
</html>
